{% extends "expense_app/base.html" %}
{% load static %}
{% block title %}Создать шаблон расхода{% endblock  %}

{% block content %}
<h2>Создать шаблон расхода</h2>
<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label for="{{ form.name.id_for_label }}" class="form-label">Название шаблона</label>
        {{ form.name }}
    </div>
    <div class="mb-3">
        <label for="{{ form.amount.id_for_label }}" class="form-label">Сумма (руб.)</label>
        {{ form.amount }}
    </div>
    <div class="mb-3">
        <label for="{{ form.category.id_for_label }}" class="form-label">Категория</label>
        {{ form.category }}
    </div>
    <div class="mb-3">
        <label for="{{ form.description.id_for_label }}" class="form-label">Комментарий</label>
        {{ form.description }}
    </div>

    <div class="mb-3">
        <label class="form-label">Теги</label>
        {{  form.tags }}
    </div>

    <button type="submit" class="btn btn-primary">Сохранить шаблон</button>
    <a href="{% url 'expense_templates_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock  %}
