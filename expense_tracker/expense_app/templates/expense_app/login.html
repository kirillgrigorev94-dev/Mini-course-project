{% extends 'expense_app/base.html' %}
{% load static %}
{% block title %}Вход в систему{% endblock %}
{% block content %}
<div class="row">
  <!-- Контейнер сетки Bootstrap (строка для размещения колонок) -->
  <div class="col-md-6 mx-auto">
    <!-- Колонка шириной 6 единиц на экранах md+, центрированная (mx-auto) -->
    <div class="card">
      <!-- Карточка Bootstrap для оформления формы -->
      <div class="card-header">
        <h4>Вход в систему учёта расходов</h4>
        <!-- Заголовок карточки -->
      </div>
      <div class="card-body">
        <!-- Тело карточки — содержимое внутри карточки -->
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="{{ form.username.id_for_label }}" class="form-label"
              >Имя пользователя</label
            >
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label for="{{ form.password.id_for_label }}" class="form-label"
              >Пароль</label
            >
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-primary">Войти</button>
          <!-- Кнопка отправки формы (вход в систему) -->
          <a href="{% url 'index' %}" class="btn btn-secondary">Отмена</a>
          <!-- Ссылка для отмены входа и возврата на главную страницу -->
        </form>
        <p class="mt-3">
          <!-- Параграф с отступом сверху (margin-top) -->
          Нет аккаунта? <a href="/admin/">Создайте через админ‑панель</a>
          <!-- Текст с предложением создать аккаунт через админ‑панель Django -->
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
